<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="cuda-morph workflow dark screenshot">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" fill="#e2e8f0">cuda-morph Workflow</text>

  <rect x="85" y="170" width="430" height="580" rx="14" fill="#111827" stroke="url(#line)" stroke-width="2"/>
  <rect x="585" y="170" width="430" height="580" rx="14" fill="#111827" stroke="url(#line)" stroke-width="2"/>
  <rect x="1085" y="170" width="430" height="580" rx="14" fill="#111827" stroke="url(#line)" stroke-width="2"/>

  <text x="300" y="240" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="600" fill="#67e8f9">Before</text>
  <text x="800" y="240" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="600" fill="#67e8f9">Activate</text>
  <text x="1300" y="240" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="600" fill="#67e8f9">After</text>

  <text x="120" y="310" font-family="Consolas, monospace" font-size="24" fill="#cbd5e1">import torch</text>
  <text x="120" y="350" font-family="Consolas, monospace" font-size="24" fill="#cbd5e1">model.cuda()</text>
  <text x="120" y="390" font-family="Consolas, monospace" font-size="24" fill="#cbd5e1">output = model(data)</text>

  <text x="620" y="310" font-family="Consolas, monospace" font-size="24" fill="#cbd5e1">import ascend_compat</text>
  <text x="620" y="350" font-family="Consolas, monospace" font-size="24" fill="#22d3ee">ascend_compat.activate()</text>
  <text x="620" y="390" font-family="Consolas, monospace" font-size="24" fill="#cbd5e1"># one line</text>

  <text x="1120" y="310" font-family="Consolas, monospace" font-size="24" fill="#cbd5e1">import torch</text>
  <text x="1120" y="350" font-family="Consolas, monospace" font-size="24" fill="#4ade80">model.cuda()  # intercepted</text>
  <text x="1120" y="390" font-family="Consolas, monospace" font-size="24" fill="#4ade80">output = model(data)</text>
  <text x="1120" y="430" font-family="Consolas, monospace" font-size="24" fill="#4ade80">device: backend-routed</text>

  <polygon points="530,445 580,445 580,420 640,465 580,510 580,485 530,485" fill="#38bdf8"/>
  <polygon points="1030,445 1080,445 1080,420 1140,465 1080,510 1080,485 1030,485" fill="#38bdf8"/>
</svg>
