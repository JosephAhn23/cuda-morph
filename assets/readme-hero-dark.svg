<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="cuda-morph hero dark screenshot">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="60" y="60" width="1480" height="780" rx="18" fill="none" stroke="url(#accent)" stroke-width="2"/>
  <text x="800" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="86" font-weight="700" fill="#e5e7eb">cuda-morph</text>
  <text x="800" y="245" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="600" fill="#f3f4f6">Run PyTorch Anywhere</text>
  <text x="800" y="295" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#9ca3af">No NVIDIA GPU required</text>

  <rect x="110" y="360" width="660" height="390" rx="12" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
  <rect x="830" y="360" width="660" height="390" rx="12" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="440" y="405" text-anchor="middle" font-family="Consolas, monospace" font-size="28" fill="#fca5a5">CUDA ERROR</text>
  <text x="1160" y="405" text-anchor="middle" font-family="Consolas, monospace" font-size="28" fill="#86efac">SUCCESSFUL EXECUTION</text>

  <text x="145" y="470" font-family="Consolas, monospace" font-size="27" fill="#f87171">RuntimeError: Torch not compiled</text>
  <text x="145" y="510" font-family="Consolas, monospace" font-size="27" fill="#f87171">with CUDA enabled</text>
  <text x="865" y="470" font-family="Consolas, monospace" font-size="27" fill="#4ade80">PyTorch model loaded</text>
  <text x="865" y="510" font-family="Consolas, monospace" font-size="27" fill="#4ade80">Running on CPU / ROCm / XPU</text>
  <text x="865" y="550" font-family="Consolas, monospace" font-size="27" fill="#4ade80">Time: 0.045s</text>

  <line x1="310" y1="590" x2="570" y2="700" stroke="#ef4444" stroke-width="20" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="570" y1="590" x2="310" y2="700" stroke="#ef4444" stroke-width="20" stroke-linecap="round" filter="url(#glow)"/>

  <polyline points="1020,650 1120,740 1300,560" fill="none" stroke="#22c55e" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
